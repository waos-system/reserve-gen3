{% extends "base.html" %}
{% block title %}満員 - {{ store.store_name }}{% endblock %}
{% block body %}
<div style="min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 16px;text-align:center;">
  <div style="font-size:48px;margin-bottom:16px;">😔</div>
  <h1 style="font-size:20px;font-weight:700;margin-bottom:8px;">この時間帯は満員です</h1>
  <p style="color:var(--text-muted);margin-bottom:24px;">別の時間帯または日付をお選びください</p>
  <a href="/book/{{ store.id }}/slots/{{ slot.slot_date }}" class="btn btn-primary">別の時間を見る</a>
</div>
{% endblock %}
